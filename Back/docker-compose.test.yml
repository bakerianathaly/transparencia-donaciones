services:
    server:
        build:
            context: .
            dockerfile: Docker/test/Dockerfile
        ports:
            - "8020:8020"
        env_file:
            - .env
        environment:
            - UVICORN_WORKERS=2
        restart: on-failure
        dns:
            - 8.8.8.8
            - 8.8.4.4
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
            interval: 30s
            timeout: 10s
            retries: 3
            start_period: 15s
        networks:
            - test-network

networks:
    test-network:
        driver: bridge

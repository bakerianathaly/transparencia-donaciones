services:
    server:
        build:
            context: .
            dockerfile: Docker/prod/Dockerfile
        ports:
            - "8020:8020"
        env_file:
            - .env
        environment:
            - UVICORN_WORKERS=4
        restart: unless-stopped
        dns:
            - 8.8.8.8
            - 8.8.4.4
        healthcheck:
            test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8020/health')"]
            interval: 30s
            timeout: 10s
            retries: 5
            start_period: 20s
        logging:
            driver: awslogs
            options:
                awslogs-group: venemergencia-cronics
                awslogs-stream: cronicos-backend
                awslogs-region: us-east-2
        networks:
            - prod-network

networks:
    prod-network:
        driver: bridge
